name: Vercel Preview (manual)

on:
  issue_comment:
    types: [created]

jobs:
  deploy-preview:
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/deploy')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      deployments: write

    steps:
      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            })

      - name: Get PR branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            })
            core.setOutput('branch', pr.head.ref)

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create GitHub deployment
        id: deployment
        uses: actions/github-script@v7
        env:
          PR_BRANCH: ${{ steps.pr.outputs.branch }}
        with:
          script: |
            const { data } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: process.env.PR_BRANCH,
              environment: 'Preview',
              auto_merge: false,
              required_contexts: [],
              description: 'Vercel preview'
            })
            core.setOutput('id', data.id)

      - name: Deploy to Vercel
        id: deploy
        run: |
          OUTPUT=$(npx vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1)
          echo "$OUTPUT"
          DEPLOY_URL=$(echo "$OUTPUT" | grep -oE 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Update deployment status
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.id }}
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: parseInt(process.env.DEPLOYMENT_ID),
              state: 'success',
              environment_url: process.env.DEPLOY_URL,
              log_url: process.env.DEPLOY_URL,
              description: 'Preview ready'
            })

      - name: Comment with preview URL
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const url = process.env.DEPLOY_URL
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview déployé**\n\n${url}`
            })
